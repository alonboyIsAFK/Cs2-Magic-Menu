<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | CS2 Magic Menu</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #2b0b52 0%, #12081f 45%, #09040f 100%);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: #8b3dff;
            filter: blur(180px);
            opacity: .18;
            animation: float 8s ease-in-out infinite;
        }

        .orb:nth-child(2){
            width:350px;
            height:350px;
            right:-80px;
            bottom:-80px;
            animation-delay:2s;
        }

        @keyframes float{
            0%,100%{
                transform:translateY(0px);
            }
            50%{
                transform:translateY(-30px);
            }
        }

        .card{
            position:relative;
            z-index:2;
            width:650px;
            max-width:90%;
            padding:50px;
            text-align:center;
            background:rgba(255,255,255,.04);
            border:1px solid rgba(170,90,255,.25);
            backdrop-filter:blur(20px);
            border-radius:20px;
            box-shadow:0 0 60px rgba(145,70,255,.25);
        }

        h1{
            font-size:3rem;
            color:#b266ff;
            margin-bottom:15px;
        }

        p{
            color:#d7d7d7;
            font-size:1.1rem;
            line-height:1.6;
            margin-bottom:25px;
        }

        .loader{
            width:60px;
            height:60px;
            border-radius:50%;
            border:4px solid rgba(255,255,255,.15);
            border-top-color:#a855f7;
            margin:30px auto;
            animation:spin 1s linear infinite;
        }

        @keyframes spin{
            to{
                transform:rotate(360deg);
            }
        }

        .small{
            font-size:.9rem;
            opacity:.65;
        }

        a{
            color:#b266ff;
        }
    </style>
</head>
<body>

<div class="orb"></div>
<div class="orb"></div>

<div class="card">
    <h1>Thank You!</h1>

    <p>
        Your download should begin automatically.<br>
        If it doesn't, click the button below.
    </p>

    <div class="loader"></div>

    <p class="small">
        Preparing download...
    </p>

    <br>

    <a id="manualDownload" href="https://github.com/YOUR_USERNAME/YOUR_REPO/releases/latest/download/Cs2Magic.exe">
        Download Manually
    </a>
</div>

<script>
const download =
"https://github.com/alonboyIsAFK/Cs2-Magic-Menu/releases/latest/download/Cs2Magic.exe";

// Start download after 1 second
setTimeout(() => {
    window.location.href = download;
}, 1000);

document.getElementById("manualDownload").href = download;
</script>

</body>
</html>
